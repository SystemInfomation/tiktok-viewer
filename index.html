<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Monitor</title>

<style>
:root {
  --bg: #020617;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: #f1f5f9;
  --muted: #94a3b8;
  --green: #22c55e;
  --red: #ef4444;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Inter, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 420px;
}

.card {
  background: var(--card);
  backdrop-filter: blur(18px);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-size: 16px;
  font-weight: 600;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
}

.status {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
  margin-bottom: 14px;
}

.badge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  display: inline-block;
  margin-bottom: 10px;
}

.ok { background: rgba(34,197,94,0.15); color: #4ade80; }
.bad { background: rgba(239,68,68,0.15); color: #f87171; }

.video-title {
  font-size: 14px;
  margin-bottom: 14px;
  line-height: 1.4;
}

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.stat {
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
}

.label {
  font-size: 10px;
  color: var(--muted);
}

.value {
  font-size: 18px;
  font-weight: 600;
  margin-top: 4px;
}

@media (max-width: 400px) {
  .value { font-size: 16px; }
  .video-title { font-size: 13px; }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="header">
      <div class="title">TikTok Monitor</div>
      <div class="dot"></div>
    </div>

    <div id="status" class="status">Connecting...</div>

    <div id="badge"></div>
    <div id="title" class="video-title"></div>

    <div class="stats">
      <div class="stat"><div class="label">Views</div><div id="views" class="value">-</div></div>
      <div class="stat"><div class="label">Likes</div><div id="likes" class="value">-</div></div>
      <div class="stat"><div class="label">Comments</div><div id="comments" class="value">-</div></div>
      <div class="stat"><div class="label">Shares</div><div id="shares" class="value">-</div></div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://api.buzzlytics.io/metadata?username=fcs.schools&service=tiktok";
const TARGET_ID = "7627717737246117134";

let prev = {};

// smooth number update
function animateValue(id, newVal) {
  const el = document.getElementById(id);
  const oldVal = prev[id] || 0;

  if (oldVal === newVal) return;

  let start = oldVal;
  const duration = 300;
  const startTime = performance.now();

  function update(t) {
    const progress = Math.min((t - startTime) / duration, 1);
    const val = Math.floor(start + (newVal - start) * progress);
    el.textContent = val.toLocaleString();
    if (progress < 1) requestAnimationFrame(update);
  }

  requestAnimationFrame(update);
  prev[id] = newVal;
}

async function check() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (!data.videos?.length) return;

    const v = data.videos.sort((a,b)=>b.createTime-a.createTime)[0];

    document.getElementById("status").innerText =
      "Updated " + new Date().toLocaleTimeString();

    if (v.id === TARGET_ID) {
      document.getElementById("badge").innerHTML =
        `<span class="badge ok">ACTIVE</span>`;
      document.getElementById("title").innerText = v.videoDescription;

      animateValue("views", v.views);
      animateValue("likes", v.likes);
      animateValue("comments", v.comments);
      animateValue("shares", v.shares);

    } else {
      document.getElementById("badge").innerHTML =
        `<span class="badge bad">NOT LATEST</span>`;
      document.getElementById("title").innerText = "Latest video mismatch";

      ["views","likes","comments","shares"].forEach(id=>{
        document.getElementById(id).textContent = "-";
      });
    }

  } catch {
    document.getElementById("status").innerText = "Connection error";
  }
}

setInterval(check, 1000);
check();
</script>

</body>
</html>
