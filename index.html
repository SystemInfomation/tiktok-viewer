<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Video Tracker</title>

<style>
:root {
  --bg: #020617;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #f1f5f9;
  --muted: #94a3b8;
  --green: #22c55e;
  --red: #ef4444;
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 420px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px;
  backdrop-filter: blur(18px);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dot {
  width: 8px;
  height: 8px;
  background: var(--green);
  border-radius: 50%;
}

.status {
  font-size: 12px;
  color: var(--muted);
  margin: 10px 0;
}

.badge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  display: inline-block;
  margin-bottom: 10px;
}

.ok { background: rgba(34,197,94,0.2); color: #4ade80; }
.bad { background: rgba(239,68,68,0.2); color: #f87171; }

.video-title {
  font-size: 14px;
  margin-bottom: 15px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.stat {
  background: rgba(255,255,255,0.04);
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.label {
  font-size: 10px;
  color: var(--muted);
}

.value {
  font-size: 18px;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="header">
      <div><strong>TikTok Tracker</strong></div>
      <div class="dot"></div>
    </div>

    <div id="status" class="status">Connecting...</div>
    <div id="badge"></div>
    <div id="title" class="video-title"></div>

    <div class="stats">
      <div class="stat"><div class="label">Views</div><div id="views" class="value">-</div></div>
      <div class="stat"><div class="label">Likes</div><div id="likes" class="value">-</div></div>
      <div class="stat"><div class="label">Comments</div><div id="comments" class="value">-</div></div>
      <div class="stat"><div class="label">Shares</div><div id="shares" class="value">-</div></div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://api.buzzlytics.io/metadata?username=fcs.schools&service=tiktok";

// ✅ YOUR TARGET VIDEO (most popular one)
const TARGET_ID = "7627717737246117134";

let prev = {};

// animate numbers
function animate(id, value) {
  const el = document.getElementById(id);
  const start = prev[id] || 0;

  if (start === value) return;

  const duration = 400;
  const startTime = performance.now();

  function frame(t) {
    const progress = Math.min((t - startTime) / duration, 1);
    const current = Math.floor(start + (value - start) * progress);
    el.textContent = current.toLocaleString();
    if (progress < 1) requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
  prev[id] = value;
}

// fetch + update
async function update() {
  try {
    const res = await fetch(API_URL, { cache: "no-store" });
    const data = await res.json();

    const video = data.videos?.find(v => v.id === TARGET_ID);

    document.getElementById("status").innerText =
      "Last updated: " + new Date().toLocaleTimeString();

    if (!video) {
      document.getElementById("badge").innerHTML =
        `<span class="badge bad">Video Not Found</span>`;
      return;
    }

    document.getElementById("badge").innerHTML =
      `<span class="badge ok">Tracking Live</span>`;

    document.getElementById("title").innerText =
      video.videoDescription || "No caption";

    animate("views", video.views || 0);
    animate("likes", video.likes || 0);
    animate("comments", video.comments || 0);
    animate("shares", video.shares || 0);

  } catch (err) {
    document.getElementById("status").innerText = "Error loading data";
    console.error(err);
  }
}

// refresh every 2 seconds
setInterval(update, 2000);
update();
</script>

</body>
</html>
